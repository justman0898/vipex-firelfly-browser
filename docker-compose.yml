version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: dns_redis
    ports:
      - "6379:6379"
    restart: always

  app:
    build: .
    container_name: dns_resolver
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/
      DNS_TTL_SECS: 120
    ports:
      - "8080:8080"